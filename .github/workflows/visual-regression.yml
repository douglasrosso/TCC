name: Visual Regression Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execucao'
        required: true
        default: 'ci'
        type: choice
        options:
          - ci
          - evaluate

permissions:
  contents: read
  pull-requests: write
  statuses: write
  actions: read

# Garante que cada PR rode apenas uma instância por vez
concurrency:
  group: visual-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Setup ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      # ── Captura + Comparacao ───────────────────────────
      - name: Capturar screenshots
        run: npm run capture

      - name: Comparar com baselines
        id: compare
        run: |
          npm run compare || true
          if [ -f results/results.json ]; then
            FAILED=$(node -e "const r=JSON.parse(require('fs').readFileSync('results/results.json','utf-8')); console.log(r.summary.failed)")
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            if [ "$FAILED" -gt 0 ]; then
              echo "has_diffs=true" >> $GITHUB_OUTPUT
            else
              echo "has_diffs=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "has_diffs=false" >> $GITHUB_OUTPUT
          fi

      # ── Evaluate (modo manual) ─────────────────────────
      - name: Executar avaliacao completa
        if: ${{ github.event.inputs.mode == 'evaluate' }}
        run: npm run evaluate

      # ── Gerar meta.json com info do commit/branch/PR ───
      - name: Gerar meta.json
        env:
          META_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          META_BRANCH: ${{ github.head_ref || github.ref_name }}
          META_BASE_BRANCH: ${{ github.base_ref || 'main' }}
          META_PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          META_PR_TITLE: ${{ github.event.pull_request.title || '' }}
          META_ACTOR: ${{ github.actor }}
          META_RUN_ID: ${{ github.run_id }}
          META_REPOSITORY: ${{ github.repository }}
          META_HAS_DIFFS: ${{ steps.compare.outputs.has_diffs || 'false' }}
          META_FAILED: ${{ steps.compare.outputs.failed || 0 }}
        run: |
          node -e "
          const fs = require('fs');
          const meta = {
            commitSha: process.env.META_COMMIT_SHA,
            commitShort: process.env.META_COMMIT_SHA.slice(0, 7),
            branch: process.env.META_BRANCH,
            baseBranch: process.env.META_BASE_BRANCH,
            prNumber: Number(process.env.META_PR_NUMBER),
            prTitle: process.env.META_PR_TITLE,
            actor: process.env.META_ACTOR,
            runId: process.env.META_RUN_ID,
            repository: process.env.META_REPOSITORY,
            timestamp: new Date().toISOString(),
            hasDiffs: process.env.META_HAS_DIFFS === 'true',
            failedCount: Number(process.env.META_FAILED)
          };
          fs.mkdirSync('results', { recursive: true });
          fs.writeFileSync('results/meta.json', JSON.stringify(meta, null, 2));
          "

      # ── Status check ───────────────────────────────────
      - name: Status check — pendente (diffs encontrados)
        if: ${{ steps.compare.outputs.has_diffs == 'true' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              description: `Aguardando review visual — ${${{ steps.compare.outputs.failed }}} tela(s) com diferenças`,
              context: 'visual-regression/review',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`
            });

      - name: Status check — sucesso (sem diffs)
        if: ${{ steps.compare.outputs.has_diffs == 'false' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              description: 'Nenhuma diferença visual encontrada',
              context: 'visual-regression/review'
            });

      # ── Upload artefatos ───────────────────────────────
      - name: Upload de resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: results/
          retention-days: 30

      # ── Comentar no PR ─────────────────────────────────
      - name: Comentar no PR
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('results/results.json')) return;

            const data = JSON.parse(fs.readFileSync('results/results.json', 'utf-8'));
            const s = data.summary;
            const hasDiffs = s.failed > 0;
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const branch = '${{ github.head_ref }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;

            let body = `## ${ hasDiffs ? '🔍 Review Visual Necessário' : '✅ Regressão Visual OK' }\n\n`;
            body += `**Commit:** \`${sha}\` · **Branch:** \`${branch}\`\n\n`;
            body += `| Técnica | Resultado |\n|---------|----------|\n`;

            for (const [tech, label] of [['pixel','Pixel'],['ssim','SSIM'],['region','Região']]) {
              const t = s.techniques[tech];
              const icon = t.failed > 0 ? '❌' : '✅';
              body += `| ${label} | ${icon} ${t.passed} OK / ${t.failed} FAIL |\n`;
            }

            if (hasDiffs) {
              body += `\n### ⏳ Merge bloqueado até review visual ser aprovado\n\n`;
              body += `**Para revisar localmente:**\n`;
              body += `1. Baixe os artefatos do [workflow](${runUrl})\n`;
              body += `2. Extraia a pasta \`results/\` na raiz do projeto\n`;
              body += `3. Execute: \`npm run review\`\n`;
              body += `4. Acesse: http://localhost:3060\n`;
              body += `5. Ao aprovar todas as telas, o status da PR será atualizado automaticamente\n`;
            }

            body += `\n> 🤖 Gerado por **PixelGuard** · run [\`${{ github.run_id }}\`](${runUrl})`;

            // Atualizar comentário existente ao invés de duplicar
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Regressão Visual')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
