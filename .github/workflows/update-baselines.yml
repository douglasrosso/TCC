name: Atualizar Baselines

# Roda ao fazer merge na main — captura novas screenshots e commita como baselines
on:
  push:
    branches: [main]

permissions:
  contents: write

# Garante que apenas uma execução roda por vez (evita race condition)
concurrency:
  group: update-baselines
  cancel-in-progress: false

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VRT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: Capturar screenshots atuais
        run: npm run capture

      - name: Atualizar baselines
        run: npm run update-baselines

      - name: Commitar baselines atualizadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nas baselines"
          else
            git commit -m "chore: atualizar baselines visuais [skip ci]"
            git push
          fi
