name: Atualizar Baselines

# Roda ao fazer merge/push na main — captura e atualiza baselines
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-baselines
  cancel-in-progress: false

jobs:
  update-baselines:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VRT_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: Capturar screenshots atuais
        run: npm run capture

      - name: Atualizar baselines
        run: npm run update-baselines

      - name: Commitar baselines atualizadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/
          if git diff --cached --quiet; then
            echo "✅ Nenhuma alteração nas baselines"
          else
            git commit -m "chore: atualizar baselines visuais [skip ci]"
            git push
            echo "📸 Baselines atualizadas e commitadas"
          fi
